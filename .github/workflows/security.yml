name: Security Audit

# Run security checks on schedule and on push to main

on:
  push:
    branches: [ main ]
    paths:
      - 'src/crypto/**'
      - 'src/secure/**'
      - 'src/session/**'
  schedule:
    # Run weekly on Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  secrets-scan:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --debug --only-verified

  dependency-check:
    name: Dependency Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Alire dependency check
        run: |
          # Check for known vulnerabilities in dependencies
          # Note: Alire doesn't have a built-in vulnerability scanner yet
          # This is a placeholder for future implementation
          echo "Dependency vulnerability scanning not yet available for Ada/Alire"
          echo "Manual review of alire.toml recommended"

  #  CodeQL is intentionally NOT run: CodeQL has no Ada/SPARK extractor, and the
  #  only C/C++ in the repo is the CUDA kernels in gpu/*.cu, which require the
  #  CUDA toolkit to compile (unavailable on the default ubuntu-latest runner).
  #  A no-op CodeQL job that builds nothing produces empty, misleading results,
  #  so it is omitted rather than left as cargo-cult security theater. Add it
  #  back on a CUDA-equipped self-hosted runner if kernel C/C++ analysis is wanted.

  spark-verification:
    name: SPARK Flow Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Alire + GNAT/SPARK toolchain
        uses: alire-project/setup-alire@v6
        with:
          toolchain: gnat_native^15 gprbuild gnatprove

      - name: Resolve SPARK tool paths
        run: |
          #  gnatprove ships with the SPARK crate; expose it on PATH so the
          #  Makefile's GNATPROVE resolution picks it up.
          echo "GNAT_BIN=$(dirname $(which gnatprove))" >> "$GITHUB_ENV"

      - name: Run SPARK flow analysis (gating)
        run: |
          #  Flow analysis (initialisation, data dependencies, non-aliasing) over
          #  the whole crypto library. This is the gating bar; `make prove`
          #  (--mode=all AoRTE+functional on the proven subset) is run locally
          #  and tracked in README.md / ARCHITECTURE.md but stays advisory in CI
          #  until the heavier proof is deterministic across toolchain versions.
          make prove-flow

  report:
    name: Security Report
    needs: [secrets-scan, dependency-check, spark-verification]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate security report
        run: |
          echo "# Security Audit Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Secrets Scan | ${{ needs.secrets-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Check | ${{ needs.dependency-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SPARK Flow Verification | ${{ needs.spark-verification.result }} |" >> $GITHUB_STEP_SUMMARY
