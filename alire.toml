# Alire package manifest for Aspida
# Build: alr build

name = "aspida"
description = "End-to-end encrypted LLM inference in Ada/SPARK: own GGUF engine (Llama/Qwen/Gemma) + own cryptography, no third-party libraries"
version = "0.1.0-dev"
authors = ["Aspida contributors"]
licenses = "MIT"
maintainers = ["maintainers@example.com"]
website = "https://github.com/the-platform.example/aspida"

[[depends-on]]
gnat = ">=12"

[configuration]
disabled = false
output_dir = "lib"
