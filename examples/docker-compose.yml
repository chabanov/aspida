services:
  aspida:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPIDA_BIND=0.0.0.0
      - ASPIDA_CLIENT_TOKEN=${ASPIDA_CLIENT_TOKEN:-change-me}
      - ASPIDA_GPU=${ASPIDA_GPU:-}
      - QWEN_MODEL_PATH=/models/qwen.gguf
    volumes:
      - ./models:/models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Nginx reverse proxy with TLS
  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
    volumes:
      - ./examples/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - aspida
    restart: unless-stopped
    profiles:
      - tls
