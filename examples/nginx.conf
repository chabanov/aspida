# Nginx reverse proxy configuration for Aspida with TLS
#
# Usage:
#   1. Generate TLS certificates (Let's Encrypt recommended)
#   2. Place certs in ./certs/ directory
#   3. Update server_name below
#   4. Run: docker-compose --profile tls up -d

events {
    worker_connections 1024;
}

http {
    upstream aspida {
        server aspida:8080;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    server {
        listen 443 ssl http2;
        server_name api.example.com;  # UPDATE THIS

        # TLS configuration
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Logging
        access_log /var/log/nginx/aspida.access.log;
        error_log /var/log/nginx/aspida.error.log;

        # API endpoints
        location /v1/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://aspida;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE streaming support
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            chunked_transfer_encoding on;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name api.example.com;  # UPDATE THIS
        return 301 https://$server_name$request_uri;
    }
}
